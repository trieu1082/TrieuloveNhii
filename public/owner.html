<h2>Owner Panel</h2>

<h3>Create Tab</h3>

<input id="tabname">
<button onclick="createTab()">Create</button>

<h3>Create Code</h3>

<input id="value">
<button onclick="createCode()">Create</button>

<script>

async function createTab(){

await fetch("/api/create-tab",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:document.getElementById("tabname").value
})
})

alert("tab created")

}

async function createCode(){

let r=await fetch("/api/create-code",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
value:document.getElementById("value").value
})
})

let d=await r.json()

alert("code: "+d.code)

}

</script>
